<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>字幕翻译小工具</title>
    <link rel="icon" type="image/png" href="./assets/logo.png" />
    <link rel="apple-touch-icon" href="./assets/logo.png" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <div class="hero-top">
          <div class="hero-brand">
            <video class="brand-logo" src="./assets/logo.mp4" autoplay muted loop playsinline></video>
          </div>
          <nav class="tool-tabs" aria-label="工具切换">
            <a class="tool-tab active" href="./index.html" aria-current="page">字幕翻译</a>
            <a class="tool-tab" href="./json-tool.html">JSON 展示</a>
            <a class="tool-tab" href="./timestamp.html">时间戳转换</a>
            <a class="tool-tab" href="./pdf-tool.html">PDF 拆分</a>
          </nav>
        </div>
      </header>

      <section class="card">
        <h2>1. 选择字幕文件</h2>
        <input id="fileInput" type="file" accept=".srt" />
        <p id="fileMeta" class="muted">未选择文件</p>
      </section>

      <section class="card">
        <h2>2. 模型设置</h2>
        <div class="grid">
          <label>
            Base URL
            <input
              id="openaiBaseInput"
              type="text"
              placeholder="http://one-api.dataflux.cn/v1"
              value="http://one-api.dataflux.cn/v1"
            />
          </label>

          <label>
            模型名称
            <input id="openaiModelInput" type="text" value="glm-5" />
          </label>

          <label>
            每批翻译条数
            <input id="batchSizeInput" type="number" min="1" value="40" />
          </label>

          <label>
            并发请求数
            <input id="concurrencyInput" type="number" min="1" value="4" />
          </label>

          <label>
            失败重试次数
            <input id="retryInput" type="number" min="0" value="2" />
          </label>

          <label>
            批次间隔(ms)
            <input id="delayInput" type="number" min="0" value="300" />
          </label>
        </div>
      </section>

      <section class="card">
        <h2>3. 提示词</h2>
        <p class="muted">默认读取并展示 <code>config.env</code> 里的 <code>PROMPT</code>。</p>
        <textarea id="promptInput" rows="10"></textarea>
      </section>

      <section class="card">
        <h2>4. 开始翻译</h2>
        <p id="outputPathText" class="muted">输出文件：尚未开始</p>
        <p id="timingText" class="muted">耗时：尚未开始</p>
        <div class="actions">
          <button id="translateBtn">开始翻译</button>
          <button id="downloadBtn" disabled>下载中文字幕 .srt</button>
        </div>
        <div class="progress-wrap">
          <progress id="progressBar" value="0" max="100"></progress>
          <span id="progressText">0%</span>
        </div>
        <pre id="logBox" class="log"></pre>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
